<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Campus Bot PRO</title>

<style>
body{font-family:Arial;background:#0d1117;color:#e6edf3;margin:0}
button{padding:10px;margin:5px;border-radius:8px;border:none;background:#58a6ff;color:#000;font-weight:bold}
input,textarea{width:100%;padding:8px;margin:5px 0;background:#161b22;color:#fff;border:1px solid #30363d;border-radius:6px}
#log{background:#161b22;padding:10px;height:200px;overflow:auto;font-size:12px}
.item{padding:6px;border-bottom:1px solid #333;cursor:pointer}
.item.sel{background:#1f6feb}
</style>
</head>

<body>

<h2>Campus Bot PRO</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<input id="proxy" value="https://campus-proxy-he3h.onrender.com/proxy">

<button onclick="connect()">Conectar</button>
<button onclick="explore()">Explorar</button>
<button onclick="extract()">Extraer</button>
<button onclick="copyPrompt()">Copiar Prompt</button>

<div id="list"></div>

<h3>LOG</h3>
<div id="log"></div>

<script>

let ST = {
 base:'https://campus.unma.net.ar/c0',
 proxy:'https://campus-proxy-he3h.onrender.com/proxy',
 cookie:'',
 items:[],
 selected:[],
 extracted:''
};

function log(t){
 let d=document.createElement('div');
 d.textContent='['+new Date().toLocaleTimeString()+'] '+t;
 document.getElementById('log').appendChild(d);
}

async function pfetch(url, opts={}){
 let headers = new Headers();
 headers.set('x-target-url',url);
 if(ST.cookie) headers.set('x-campus-cookie',ST.cookie);

 let res = await fetch(ST.proxy,{
   method:opts.method||'GET',
   headers,
   body:opts.body
 });

 let sc = res.headers.get('x-set-cookie');
 if(sc){
   let m=sc.match(/MoodleSession[^=]*=([^;]+)/);
   if(m) ST.cookie='MoodleSession='+m[1];
 }

 return res;
}

async function connect(){
 let u=document.getElementById('user').value;
 let p=document.getElementById('pass').value;

 log('Login...');

 let r1=await pfetch(ST.base+'/login/index.php');
 let h1=await r1.text();

 let tok=(h1.match(/logintoken" value="([^"]+)/)||[])[1]||'';

 let body=`username=${u}&password=${p}&logintoken=${tok}`;

 let r2=await pfetch(ST.base+'/login/index.php',{method:'POST',body});
 let h2=await r2.text();

 if(h2.includes('loginerrors')){log('ERROR LOGIN');return;}

 log('OK LOGIN');
}

async function explore(){

 log('Explorando...');

 let r=await pfetch(ST.base+'/my/');
 let h=await r.text();

 let doc=new DOMParser().parseFromString(h,'text/html');

 let links=doc.querySelectorAll('#course-index a.courseindex-link');

 ST.items=[];

 links.forEach(a=>{
   let url=a.href;
   let name=a.textContent.trim();
   if(!url||!name||url.startsWith('#')) return;

   ST.items.push({name,url});
 });

 render();
 log('Items: '+ST.items.length);
}

function render(){
 let div=document.getElementById('list');
 div.innerHTML='';

 ST.items.forEach((it,i)=>{
   let d=document.createElement('div');
   d.className='item';
   d.textContent=it.name;
   d.onclick=()=>{
     d.classList.toggle('sel');
     if(ST.selected.includes(i)) ST.selected.splice(ST.selected.indexOf(i),1);
     else ST.selected.push(i);
   };
   div.appendChild(d);
 });
}

async function extract(){

 log('Extrayendo...');

 let out=[];

 for(let i of ST.selected){

   let item=ST.items[i];
   log('-> '+item.name);

   let r=await pfetch(item.url);
   let h=await r.text();

   let doc=new DOMParser().parseFromString(h,'text/html');

   let txt='';

   if(item.url.includes('/forum/')){

     let topics=[...doc.querySelectorAll('a[href*="discuss.php"]')].slice(0,15);

     for(let t of topics){
       let r2=await pfetch(t.href);
       let h2=await r2.text();
       let d2=new DOMParser().parseFromString(h2,'text/html');

       d2.querySelectorAll('.forumpost,.post-content').forEach(p=>{
         txt+=p.textContent.trim()+'\n\n';
       });
     }

   } else {

     let main=doc.querySelector('#region-main')||doc.body;
     txt=main.textContent.trim().slice(0,3000);

   }

   out.push('=== '+item.name+' ===\n\n'+txt);
 }

 ST.extracted=out.join('\n\n----------------\n\n');

 log('OK extracción ('+ST.extracted.length+')');
}

function copyPrompt(){

 let MAX=100000;

 let prompt='Analiza el siguiente contenido:\n\n'+ST.extracted.slice(0,MAX);

 if(ST.extracted.length>MAX){
   prompt+='\n\n[TRUNCADO]';
 }

 navigator.clipboard.writeText(prompt);

 log('Copiado ('+prompt.length+')');
 alert('Prompt copiado para ChatGPT');
}

</script>

</body>
</html>
